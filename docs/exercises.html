<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overlift // System - Program Builder</title>
    <style>
      /* --- BRANDING & DESIGN SYSTEM (PER SCREENSHOTS) --- */
      :root {
        --bg-main: #0a0a0a;
        --bg-card: #121212;
        --bg-input: #181818;
        --bg-hover: #1e1e1e;
        --bg-active: #262626;

        --border-subtle: #222222;
        --border-focus: #3a3a3a;

        --text-primary: #ffffff;
        --text-secondary: #888888;
        --text-muted: #555555;

        --accent-brand: #ccff00; /* Neon Lime / Yellow from UI */
        --accent-brand-hover: #b5e600;
        --accent-danger: #ff4444;
        --accent-danger-hover: #cc3333;

        --font-main:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        --font-mono:
          ui-monospace, SFMono-Regular, SF Pro Mono, Menlo, Monaco, Consolas,
          monospace;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-main);
        color: var(--text-primary);
        font-family: var(--font-main);
        -webkit-font-smoothing: antialiased;
        padding-bottom: 60px;
      }

      /* --- HEADER --- */
      header {
        padding: 24px 40px;
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .brand-meta {
        font-size: 11px;
        font-family: var(--font-mono);
        letter-spacing: 2px;
        color: var(--text-secondary);
        text-transform: uppercase;
      }

      .brand-meta span {
        color: var(--text-muted);
        margin: 0 4px;
      }

      .user-nav {
        font-size: 11px;
        color: var(--text-secondary);
      }
      .user-nav span {
        color: var(--text-muted);
        margin-right: 8px;
      }
      .user-nav a {
        color: var(--text-secondary);
        text-decoration: none;
      }
      .user-nav a:hover {
        color: var(--text-primary);
      }

      /* --- LAYOUT CONTAINER --- */
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px 24px;
      }

      /* --- APP BANNER / MOTIVATION --- */
      .app-banner {
        margin-bottom: 40px;
      }
      .app-banner h1 {
        font-size: 72px;
        font-weight: 900;
        letter-spacing: -2px;
        line-height: 0.95;
        text-transform: uppercase;
        color: var(--text-primary);
      }
      .app-banner h1 .highlight {
        color: var(--accent-brand);
        display: block;
      }

      /* --- TOP TABS (NAVIGATION) --- */
      .nav-tabs {
        display: flex;
        gap: 8px;
        border-bottom: 1px solid var(--border-subtle);
        margin-bottom: 32px;
        padding-bottom: 1px;
      }
      .nav-tab {
        background: none;
        border: none;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 500;
        padding: 12px 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 6px 6px 0 0;
        position: relative;
      }
      .nav-tab:hover {
        color: var(--text-primary);
        background-color: rgba(255, 255, 255, 0.02);
      }
      .nav-tab.active {
        color: var(--text-primary);
      }
      .nav-tab.active::after {
        content: "";
        position: absolute;
        bottom: -1px;
        left: 0;
        right: 0;
        height: 2px;
        background-color: var(--accent-brand);
      }

      /* --- WORKSPACE SPLIT BLOCK --- */
      .builder-layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 32px;
        align-items: start;
      }

      @media (max-width: 900px) {
        .builder-layout {
          grid-template-columns: 1fr;
        }
      }

      /* --- CARD STYLING --- */
      .card {
        background-color: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 24px;
      }

      .card-title {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-secondary);
        margin-bottom: 16px;
        font-weight: 600;
      }

      /* --- PROGRAM INFO BLOCK --- */
      .program-header-block {
        margin-bottom: 24px;
      }
      .program-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        margin-bottom: 6px;
      }
      .program-name-display {
        font-size: 24px;
        font-weight: 700;
        color: var(--text-primary);
      }

      /* --- DAYS LIST SELECTOR --- */
      .days-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .day-selector-btn {
        background-color: transparent;
        border: 1px solid var(--border-subtle);
        border-radius: 6px;
        padding: 14px 16px;
        color: var(--text-secondary);
        text-align: left;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.2s ease;
      }
      .day-selector-btn:hover {
        border-color: var(--border-focus);
        color: var(--text-primary);
        background-color: rgba(255, 255, 255, 0.01);
      }
      .day-selector-btn.active {
        border-color: var(--accent-brand);
        background-color: rgba(204, 255, 0, 0.04);
        color: var(--text-primary);
        font-weight: 600;
      }
      .day-selector-btn .meta-count {
        font-size: 11px;
        font-family: var(--font-mono);
        background-color: var(--bg-input);
        padding: 2px 6px;
        border-radius: 4px;
        color: var(--text-secondary);
      }
      .day-selector-btn.active .meta-count {
        background-color: var(--accent-brand);
        color: var(--bg-main);
        font-weight: 700;
      }

      /* --- WORKOUT DAY WORKSPACE --- */
      .day-workspace-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        border-bottom: 1px solid var(--border-subtle);
        padding-bottom: 16px;
      }
      .day-title-area h2 {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }
      .day-title-area p {
        font-size: 13px;
        color: var(--text-secondary);
        margin-top: 4px;
      }

      /* --- BUTTONS --- */
      .btn {
        font-family: var(--font-main);
        font-size: 14px;
        font-weight: 600;
        padding: 10px 16px;
        border-radius: 6px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.15s ease;
        border: none;
      }
      .btn-primary {
        background-color: var(--accent-brand);
        color: var(--bg-main);
      }
      .btn-primary:hover {
        background-color: var(--accent-brand-hover);
      }
      .btn-secondary {
        background-color: var(--bg-input);
        color: var(--text-primary);
        border: 1px solid var(--border-subtle);
      }
      .btn-secondary:hover {
        background-color: var(--bg-hover);
        border-color: var(--border-focus);
      }
      .btn-text {
        background: none;
        color: var(--text-secondary);
        padding: 6px;
      }
      .btn-text:hover {
        color: var(--text-primary);
      }
      .btn-danger-text {
        background: none;
        color: var(--text-muted);
        padding: 6px;
      }
      .btn-danger-text:hover {
        color: var(--accent-danger);
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
      }
      .btn-block {
        display: flex;
        width: 100%;
        justify-content: center;
      }

      /* --- EXERCISES DRAGGABLE LIST --- */
      .exercise-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .exercise-row {
        display: flex;
        align-items: center;
        background-color: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 16px;
        transition:
          transform 0.2s ease,
          border-color 0.2s ease,
          box-shadow 0.2s ease;
        user-select: none;
      }
      .exercise-row:hover {
        border-color: var(--border-focus);
      }
      .exercise-row.dragging {
        opacity: 0.5;
        background-color: var(--bg-hover);
        border-color: var(--accent-brand);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        transform: scale(1.01);
      }

      .drag-handle {
        cursor: grab;
        color: var(--text-muted);
        padding-right: 12px;
        display: flex;
        align-items: center;
      }
      .drag-handle:active {
        cursor: grabbing;
      }
      .drag-handle hover {
        color: var(--text-secondary);
      }

      .pos-index {
        font-family: var(--font-mono);
        font-size: 13px;
        color: var(--text-muted);
        width: 24px;
      }

      .exercise-main-info {
        flex: 1;
        min-width: 0;
        padding-right: 16px;
      }
      .exercise-row-name {
        font-weight: 600;
        font-size: 15px;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 4px;
      }
      .exercise-row-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }

      .exercise-row-settings {
        display: flex;
        align-items: center;
        gap: 24px;
        margin-right: 16px;
      }
      .setting-metric {
        text-align: right;
      }
      .setting-metric .metric-val {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-primary);
        font-family: var(--font-mono);
      }
      .setting-metric .metric-lbl {
        font-size: 11px;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 2px;
      }

      .exercise-row-actions {
        display: flex;
        align-items: center;
        gap: 4px;
        border-left: 1px solid var(--border-subtle);
        padding-left: 12px;
      }

      /* --- EMPTY STATES --- */
      .empty-state {
        text-align: center;
        padding: 64px 24px;
        border: 2px dashed var(--border-subtle);
        border-radius: 8px;
        color: var(--text-secondary);
      }
      .empty-state p {
        margin-bottom: 20px;
        font-size: 15px;
      }

      /* --- BADGES --- */
      .badge {
        font-size: 11px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        display: inline-block;
      }
      .badge-back {
        background-color: rgba(0, 150, 255, 0.15);
        color: #33b5ff;
      }
      .badge-chest {
        background-color: rgba(255, 80, 80, 0.15);
        color: #ff6666;
      }
      .badge-shoulders {
        background-color: rgba(255, 165, 0, 0.15);
        color: #ffa500;
      }
      .badge-biceps {
        background-color: rgba(180, 100, 255, 0.15);
        color: #c080ff;
      }
      .badge-triceps {
        background-color: rgba(0, 200, 150, 0.15);
        color: #33cc99;
      }
      .badge-quads {
        background-color: rgba(230, 230, 0, 0.15);
        color: #ffff33;
      }
      .badge-hamstrings {
        background-color: rgba(200, 120, 80, 0.15);
        color: #ff9966;
      }
      .badge-calves {
        background-color: rgba(140, 140, 140, 0.15);
        color: #b3b3b3;
      }
      .badge-core {
        background-color: rgba(255, 50, 150, 0.15);
        color: #ff66b2;
      }
      .badge-generic {
        background-color: rgba(255, 255, 255, 0.08);
        color: var(--text-secondary);
      }
      .badge-custom {
        background-color: rgba(204, 255, 0, 0.15);
        color: var(--accent-brand);
        border: 1px solid rgba(204, 255, 0, 0.3);
      }

      /* --- MODAL BASE STYLING --- */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        backdrop-filter: blur(4px);
        padding: 16px;
      }
      .modal-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }

      .modal-window {
        background-color: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 12px;
        width: 100%;
        max-width: 560px;
        max-height: 85vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        transform: scale(0.96);
        transition: transform 0.2s ease;
      }
      .modal-overlay.active .modal-window {
        transform: scale(1);
      }

      .modal-header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .modal-header h3 {
        font-size: 18px;
        font-weight: 700;
      }

      .modal-body {
        padding: 24px;
        overflow-y: auto;
        flex: 1;
      }

      .modal-footer {
        padding: 16px 24px;
        border-top: 1px solid var(--border-subtle);
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        background-color: rgba(0, 0, 0, 0.2);
      }

      /* --- FORM CONTROLS --- */
      .form-group {
        margin-bottom: 20px;
      }
      .form-group:last-child {
        margin-bottom: 0;
      }
      .form-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .form-input {
        width: 100%;
        background-color: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: 6px;
        padding: 12px 14px;
        color: var(--text-primary);
        font-family: var(--font-main);
        font-size: 14px;
        transition: all 0.15s ease;
      }
      .form-input:focus {
        outline: none;
        border-color: var(--border-focus);
        background-color: var(--bg-hover);
      }
      .form-input::placeholder {
        color: var(--text-muted);
      }

      /* --- SPECIALIZED CONFIG UNITS --- */
      .settings-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 16px;
        background-color: rgba(255, 255, 255, 0.01);
        padding: 16px;
        border-radius: 8px;
        border: 1px solid var(--border-subtle);
      }

      /* --- SELECTION / SEARCH MODAL SPECIFICS --- */
      .search-container {
        position: relative;
        margin-bottom: 16px;
      }
      .search-icon-embedded {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        display: flex;
        align-items: center;
      }
      .search-container .form-input {
        padding-left: 40px;
      }

      .library-scroll-zone {
        max-height: 380px;
        overflow-y: auto;
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        background-color: rgba(0, 0, 0, 0.1);
      }

      .library-section-title {
        background-color: var(--bg-input);
        padding: 8px 14px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-secondary);
        border-top: 1px solid var(--border-subtle);
        border-bottom: 1px solid var(--border-subtle);
      }
      .library-section-title:first-child {
        border-top: none;
      }

      .library-item-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        cursor: pointer;
        transition: background-color 0.1s ease;
      }
      .library-item-row:last-child {
        border-bottom: none;
      }
      .library-item-row:hover {
        background-color: var(--bg-hover);
      }
      .item-meta-block {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .item-title-text {
        font-size: 14px;
        font-weight: 600;
      }
      .item-tags-row {
        display: flex;
        gap: 6px;
      }

      .modal-inline-notice {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid var(--border-subtle);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .modal-inline-notice p {
        font-size: 13px;
        color: var(--text-secondary);
      }

      /* --- NESTED/EXPANDABLE SUBFORM --- */
      .custom-exercise-panel {
        background-color: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 16px;
        margin-top: 16px;
        display: none; /* Controlled dynamically */
      }
      .custom-exercise-panel.active {
        display: block;
      }
      .panel-header-title {
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--accent-brand);
        margin-bottom: 14px;
      }

      /* Utility classes */
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand-meta">OVERLIFT <span>//</span> SYSTEM</div>
      <div class="user-nav">
        <span>saugatec@gmail.com</span>
        <a href="#signout">Sign out</a>
      </div>
    </header>

    <div class="container">
      <div class="app-banner">
        <h1>Stop switching <span class="highlight">too soon</span></h1>
      </div>

      <div class="nav-tabs">
        <button class="nav-tab">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path
              d="M18 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"
            />
            <path d="M8 7h8M8 12h8M8 17h4" />
          </svg>
          Workout
        </button>
        <button class="nav-tab">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
          Rest timer
        </button>
        <button class="nav-tab active">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
          </svg>
          Programs
        </button>
      </div>

      <div class="builder-layout">
        <div class="card">
          <div class="program-header-block">
            <div class="program-label">Active Program</div>
            <div class="program-name-display" id="programNameDisplay">
              Push Pull Legs
            </div>
          </div>

          <div class="card-title">Program Architecture</div>
          <div class="days-list" id="daysContainer"></div>
        </div>

        <div class="workspace-main">
          <div class="day-workspace-header">
            <div class="day-title-area">
              <h2 id="currentDayTitle">Push Day</h2>
              <p id="currentDaySubtitle">0 exercises configured</p>
            </div>
            <div>
              <button class="btn btn-primary" id="triggerAddExerciseBtn">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                >
                  <line x1="12" y1="5" x2="12" y2="19" />
                  <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                Add Exercise
              </button>
            </div>
          </div>

          <div class="exercise-list" id="exerciseListContainer"></div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="addExerciseModal">
      <div class="modal-window">
        <div class="modal-header">
          <h3>Add Exercise</h3>
          <button class="btn-text" onclick="closeModal('addExerciseModal')">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="search-container">
            <span class="search-icon-embedded">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
            </span>
            <input
              type="text"
              class="form-input"
              id="exerciseSearchField"
              placeholder="Search exercises..."
              autocomplete="off"
            />
          </div>

          <div class="library-scroll-zone" id="libraryScrollZone"></div>

          <div class="modal-inline-notice" id="libraryNoticeFooter">
            <p>Can't find your exercise?</p>
            <button class="btn btn-secondary btn-sm" id="btnToggleCustomForm">
              + Create Custom Exercise
            </button>
          </div>

          <div class="custom-exercise-panel" id="customExerciseFormPanel">
            <div class="panel-header-title">Create Custom Exercise</div>

            <div class="form-group">
              <label class="form-label">Exercise Name</label>
              <input
                type="text"
                class="form-input"
                id="customNameField"
                placeholder="e.g., My Gym Special Row"
              />
            </div>

            <div class="form-group">
              <label class="form-label">Muscle Group</label>

        if (m.includes("shoulder")) return "badge-shoulders";

        const dayObj = currentProgramDays.find((d) => d.id === selectedDayId);

          const equip = def ? def.equipment : "";
          const isCustom = def ? def.isCustom : false;

          row.setAttribute("draggable", "true");

      // --- DRAG AND DROP REORDER SYSTEM IMPLEMENTATION ---
      let dragTargetElement = null;

      function setupDragDropEvents(row) {
        row.addEventListener("dragstart", function (e) {
          dragTargetElement = this;
          this.classList.add("dragging");
          e.dataTransfer.effectAllowed = "move";
        });

        row.addEventListener("dragend", function () {
          dragTargetElement.classList.remove("dragging");
          dragTargetElement = null;
          recalculatePositionsFromDOM();
        });

        row.addEventListener("dragover", function (e) {
          e.preventDefault();
          return false;
        });

        row.addEventListener("dragenter", function (e) {
          if (this !== dragTargetElement) {
            this.style.borderTop = "2px solid var(--accent-brand)";
          }
        });

        row.addEventListener("dragleave", function () {
          this.style.borderTop = "";
        });

        row.addEventListener("drop", function (e) {
          e.preventDefault();
          this.style.borderTop = "";
          if (this !== dragTargetElement) {
            const allRows = Array.from(
              document
                .getElementById("exerciseListContainer")
                .querySelectorAll(".exercise-row"),
            );
            const targetIdx = allRows.indexOf(this);
            const dragIdx = allRows.indexOf(dragTargetElement);

            if (dragIdx < targetIdx) {
              this.parentNode.insertBefore(dragTargetElement, this.nextSibling);
            } else {
              this.parentNode.insertBefore(dragTargetElement, this);
            }
          }
        });
      }

      function recalculatePositionsFromDOM() {
        const rows = document
          .getElementById("exerciseListContainer")
          .querySelectorAll(".exercise-row");
        rows.forEach((row, idx) => {
          const itemId = parseInt(row.getAttribute("data-id"));
          const matchedItem = currentProgramExercises.find(
            (e) => e.id === itemId,
          );
          if (matchedItem) {
            matchedItem.position = idx + 1;
          }
        });
        // Instant render refresh to align visual numerical sequences
        renderDayWorkspace();
      }

      function deleteExercise(id) {
        currentProgramExercises = currentProgramExercises.filter(
          (e) => e.id !== id,
        );
        // Re-normalize layout indexes
        const remaining = currentProgramExercises
          .filter((e) => e.user_program_day_id === selectedDayId)
          .sort((a, b) => a.position - b.position);
        remaining.forEach((e, idx) => (e.position = idx + 1));

        renderDaysSidebar();
        renderDayWorkspace();

        openModal("editSettingsModal");

      // --- CATALOG EXERCISE LIBRARY SEARCH & FILTER LOGIC ---
      function renderLibraryList(filterQuery = "") {
        const zone = document.getElementById("libraryScrollZone");
        zone.innerHTML = "";

        const normalizedQuery = filterQuery.trim().toLowerCase();

        if (normalizedQuery === "") {
          // Display structural dictionary layout view grouped by Target Muscle
          const groups = {};
          EXERCISE_LIBRARY.forEach((ex) => {
            if (!groups[ex.muscle]) groups[ex.muscle] = [];
            groups[ex.muscle].push(ex);
          });

          Object.keys(groups)
            .sort()
            .forEach((muscleGroup) => {
              const header = document.createElement("div");
              header.className = "library-section-title";
              header.innerText = muscleGroup;
              zone.appendChild(header);

              groups[muscleGroup].forEach((ex) => {
                zone.appendChild(createLibraryRowElement(ex));
              });
            });

          document
            .getElementById("libraryNoticeFooter")
            .classList.remove("hidden");
        } else {
          // Execute direct real-time filter match
          const matched = EXERCISE_LIBRARY.filter(
            (ex) =>
              ex.name.toLowerCase().includes(normalizedQuery) ||
              ex.muscle.toLowerCase().includes(normalizedQuery),
          );

          if (matched.length === 0) {
            zone.innerHTML = `
                        <div style="text-align:center; padding:32px 16px; color:var(--text-secondary); font-size:14px;">
                            No matching exercises found
                        </div>

            // Automatically pop/show customization prompt panel when query is explicitly empty
            document
              .getElementById("libraryNoticeFooter")
              .classList.remove("hidden");
          } else {
            matched.forEach((ex) => {
              zone.appendChild(createLibraryRowElement(ex));
            });
            document
              .getElementById("libraryNoticeFooter")
              .classList.remove("hidden");
          }
        }
      }

      function createLibraryRowElement(ex) {
        const row = document.createElement("div");
        row.className = "library-item-row";
        row.onclick = () => selectExerciseFromLibrary(ex.id);

        row.innerHTML = `

        return row;

      function selectExerciseFromLibrary(exerciseId) {
        const currentDayExs = currentProgramExercises.filter(
          (e) => e.user_program_day_id === selectedDayId,

        const newId =
          currentProgramExercises.length > 0
            ? Math.max(...currentProgramExercises.map((e) => e.id)) + 1
            : 601;

        const newExItem = {
          id: newId,
          user_program_day_id: selectedDayId,
          exercise_id: exerciseId,
          position: nextPosition,
          sets: 3,
          rep_min: 8,
          rep_max: 12,
        };

        currentProgramExercises.push(newExItem);

        closeModal("addExerciseModal");
        renderDaysSidebar();
        renderDayWorkspace();

          .value.trim();
        const muscleInput = document.getElementById("customMuscleField").value;
        const equipInput = document.getElementById(
          "customEquipmentField",
        ).value;

        if (!nameInput) {
          alert("Please enter a custom exercise name.");
          return;
        }

        const nextExId =
          EXERCISE_LIBRARY.length > 0
            ? Math.max(...EXERCISE_LIBRARY.map((x) => x.id)) + 1
            : 1001;

        const customDefinition = {
          id: nextExId,
          name: nameInput,
          muscle: muscleInput,
          equipment: equipInput,
          isCustom: true,
        };

        // Push into static tracking system runtime matrix
        EXERCISE_LIBRARY.push(customDefinition);

        // Clean/Reset input form layouts
        resetCustomExerciseForm();

        // Select immediately and inject straight into active training sequence
        selectExerciseFromLibrary(nextExId);
      };

      function resetCustomExerciseForm() {
        document.getElementById("customNameField").value = "";
        document
          .getElementById("customExerciseFormPanel")
          .classList.remove("active");
        document.getElementById("exerciseSearchField").value = "";
        renderLibraryList("");
      }

      // --- GENERAL ROUTINE MODAL OVERLAY UTILITIES ---
      function openModal(id) {
        document.getElementById(id).classList.add("active");
      }

      function closeModal(id) {
        document.getElementById(id).classList.remove("active");
        if (id === "addExerciseModal") {
          resetCustomExerciseForm();
        }
      }

      function openAddExerciseModal() {
        document.getElementById("exerciseSearchField").value = "";
        renderLibraryList("");
        openModal("addExerciseModal");
        setTimeout(() => {
          document.getElementById("exerciseSearchField").focus();
        }, 100);
      }

      // Wire triggering button components
      document.getElementById("triggerAddExerciseBtn").onclick =
        openAddExerciseModal;

      document.getElementById("exerciseSearchField").oninput = function (e) {
        renderLibraryList(e.target.value);
      };

      // Window dismiss tracking hook definitions
      window.onclick = function (event) {
        if (event.target.classList.contains("modal-overlay")) {
          closeModal(event.target.id);
        }
      };

      // --- SYSTEM INITIALIZATION RUNTIME ---
      selectDay(201);
    </script>
  </body>
</html>
